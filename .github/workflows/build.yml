name: Build, Test & Desktop Artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      # The engine modules use the Android Multiplatform Library plugin, so the whole
      # Gradle build needs the Android SDK to even configure — required for the JVM tests too.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile (all common + JVM)
        run: ./gradlew compileKotlinJvm --stacktrace

      - name: Wasm-safety check (engine must compile for wasmJs)
        run: ./gradlew :core:pipeline:compileKotlinWasmJs :core:ir:compileKotlinWasmJs :core:api:compileKotlinWasmJs --stacktrace

      - name: Run JVM unit tests
        run: ./gradlew jvmTest --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/**'
          if-no-files-found: ignore

  desktop:
    name: Desktop artifact (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            java_arch: x64
          - os: windows-latest
            name: windows
            java_arch: x64
          # Apple Silicon (arm64): macos-latest currently points to an arm64 image;
          # produces a native aarch64 .dmg / app image.
          - os: macos-latest
            name: macos-arm64
            java_arch: aarch64
          # Intel (x64): macos-26-intel is an Intel-based macOS runner image;
          # produces a native x64 .dmg / app image.
          - os: macos-26-intel
            name: macos-x64
            java_arch: x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          # Match the JDK arch to the runner so Compose Desktop packages a genuinely
          # arch-specific binary (never an x64 JDK on an arm64 runner, or vice versa).
          architecture: ${{ matrix.java_arch }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # Native installer for the current OS (Compose Desktop: .deb on Linux, .msi on Windows, .dmg on macOS).
      - name: Package native distribution
        run: ./gradlew :desktopApp:packageDistributionForCurrentOS --stacktrace

      # Also produce a runnable app image (no OS installer tooling required) as a robust fallback artifact.
      - name: Create distributable app image
        run: ./gradlew :desktopApp:createDistributable --stacktrace

      # Runnable `java -jar` uber jar. Compose bundles only the current runner's OS/arch skiko
      # native, so each matrix runner produces a jar valid for its own platform (hence per-OS name).
      - name: Build runnable uber jar
        run: ./gradlew :desktopApp:packageUberJarForCurrentOS --stacktrace

      - name: Upload native installer
        uses: actions/upload-artifact@v7
        with:
          name: jadxmp-desktop-installer-${{ matrix.name }}
          path: |
            desktopApp/build/compose/binaries/main/deb/*.deb
            desktopApp/build/compose/binaries/main/msi/*.msi
            desktopApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload app image
        uses: actions/upload-artifact@v7
        with:
          name: jadxmp-desktop-app-${{ matrix.name }}
          path: desktopApp/build/compose/binaries/main/app/**
          if-no-files-found: warn

      # Runnable `java -jar` JVM artifact (uber jar). Per-OS because the bundled skiko native is OS/arch-specific.
      - name: Upload runnable jvm jar
        uses: actions/upload-artifact@v7
        with:
          name: jadxmp-jvm-${{ matrix.name }}
          path: desktopApp/build/compose/jars/*.jar
          if-no-files-found: warn
